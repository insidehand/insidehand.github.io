                <div class="post-content">
                    <h2 id="default">Default</h2>
<p>cmd + opt + `</p>
<blockquote>
<p>切換focus, 可以在navigation(right area), editor, lldb三個地方來回切換。可以用shift倒回</p>
</blockquote>
<p>cmd + b</p>
<blockquote>
<p>Build</p>
</blockquote>
<hr>
<h2 id="custom">Custom</h2>
<p>ctrl + opt + cmd + a</p>
<blockquote>
<p>attach to process by name</p>
</blockquote>
<p>ctrl + opt + cmd + d</p>
<blockquote>
<p>detach from process</p>
</blockquote>
